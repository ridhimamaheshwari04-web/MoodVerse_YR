<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Moodverse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: rgba(255,255,255,0.07);
      --text: #f0eff8; --muted: #7c7c9a; --accent: #7c6dfa;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .orb1 { width: 500px; height: 500px; background: rgba(124,109,250,0.2); top: -150px; left: -150px; animation: driftA 14s ease-in-out infinite alternate; }
    .orb2 { width: 400px; height: 400px; background: rgba(251,113,133,0.1); bottom: -100px; right: -100px; animation: driftB 12s ease-in-out infinite alternate; }
    @keyframes driftA { to { transform: translate(60px, 60px); } }
    @keyframes driftB { to { transform: translate(-50px, -50px); } }

    /* Card */
    .auth-card {
      position: relative; z-index: 10;
      background: rgba(18,18,26,0.9); backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: 28px;
      padding: 48px 44px; width: 100%; max-width: 420px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: slideUp 0.5s ease both;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

    .auth-logo {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: 1.1rem; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c4b5fd, #7c6dfa);
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px; display: block; text-decoration: none;
    }
    .auth-title {
      font-family: 'Playfair Display', serif; font-size: 2rem;
      letter-spacing: -0.02em; margin-bottom: 8px;
    }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 13px 16px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text); font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus { outline: none; border-color: rgba(124,109,250,0.5); background: rgba(124,109,250,0.05); }
    .form-input.error { border-color: rgba(255,100,100,0.5); }
    .error-msg { color: #ff6b6b; font-size: 0.78rem; margin-top: 5px; display: none; }
    .error-msg.show { display: block; }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 100px; border: none;
      background: linear-gradient(135deg, #7c6dfa, #a78bfa);
      color: #fff; font-size: 0.95rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px;
      box-shadow: 0 8px 30px rgba(124,109,250,0.35);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(124,109,250,0.45); }
    .btn-submit:active { transform: translateY(0); }

    .auth-switch { text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.88rem; }
    .auth-switch a { color: #c4b5fd; text-decoration: none; font-weight: 500; }
    .auth-switch a:hover { text-decoration: underline; }

    .global-error {
      background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3);
      color: #ff6b6b; border-radius: 10px; padding: 12px 16px;
      font-size: 0.85rem; margin-bottom: 16px; display: none;
    }
    .global-error.show { display: block; }

    /* Tabs */
    .auth-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .auth-tab {
      flex: 1; padding: 9px; border-radius: 9px; border: none; background: transparent;
      color: var(--muted); font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* Password Toggle Styling */
.password-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.password-wrapper .form-input {
  padding-right: 44px; /* Make space for the icon */
}
.toggle-password {
  position: absolute;
  right: 12px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  transition: color 0.2s;
}
.toggle-password:hover {
  color: var(--accent);
}
.toggle-password svg {
  width: 20px;
  height: 20px;
}
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="auth-card">
    <a href="index.html" class="auth-logo">✦ Moodverse</a>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Global error -->
    <div class="global-error" id="global-error"></div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="panel-login">
      <h1 class="auth-title" id="login-title">Welcome back</h1>
      <p class="auth-sub" id="login-sub">Sign in to track your mood journey</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="you@example.com">
        <div class="error-msg" id="login-email-err">Invalid email address</div>
      </div>
      <div class="form-group">
  <label class="form-label">Password</label>
  <div class="password-wrapper">
    <input type="password" class="form-input" id="login-password" placeholder="••••••••">
    <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
  </div>
  <div class="error-msg" id="login-pass-err">Password required</div>
</div>
      <button class="btn-submit" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="panel-signup">
      <h1 class="auth-title" id="signup-title">Join Moodverse</h1>
      <p class="auth-sub" id="signup-sub">Create your free account today</p>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" id="signup-name" placeholder="Your name">
        <div class="error-msg" id="signup-name-err">Name is required</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signup-email" placeholder="you@example.com">
        <div class="error-msg" id="signup-email-err">Invalid email address</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signup-password" placeholder="Min 6 characters">
        <div class="error-msg" id="signup-pass-err">Password must be at least 6 characters</div>
      </div>
      <button class="btn-submit" onclick="handleSignup()">Create Account</button>
    </div>
  </div>


  <script src="assets/moodverse.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.user) window.location.href = 'index.html';

    // Check if coming from signup link
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'signup') switchTab('signup');

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      document.getElementById('global-error').classList.remove('show');
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      if (msg) el.textContent = msg;
      el.classList.add('show');
    }
    function clearErrs(...ids) { ids.forEach(id => { const el = document.getElementById(id); if(el) el.classList.remove('show'); }); }
    function showGlobal(msg) {
      const el = document.getElementById('global-error');
      el.textContent = msg; el.classList.add('show');
    }
    function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    function handleLogin() {
      clearErrs('login-email-err', 'login-pass-err');
      document.getElementById('global-error').classList.remove('show');
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      let ok = true;
      if (!email || !validateEmail(email)) { showErr('login-email-err', 'Invalid email address'); ok = false; }
      if (!pass) { showErr('login-pass-err', 'Password required'); ok = false; }
      if (!ok) return;
      const result = Auth.login(email, pass);
      if (!result.ok) { showGlobal(result.err); return; }
      window.location.href = 'index.html';
    }

    function handleSignup() {
      clearErrs('signup-name-err', 'signup-email-err', 'signup-pass-err');
      document.getElementById('global-error').classList.remove('show');
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-password').value;
      let ok = true;
      if (!name) { showErr('signup-name-err', 'Name is required'); ok = false; }
      if (!email || !validateEmail(email)) { showErr('signup-email-err', 'Invalid email address'); ok = false; }
      if (!pass || pass.length < 6) { showErr('signup-pass-err', 'Password must be at least 6 characters'); ok = false; }
      if (!ok) return;
      const result = Auth.signup(name, email, pass);
      if (!result.ok) { showGlobal(result.err); return; }
      window.location.href = 'index.html';
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const activePanel = document.querySelector('.form-panel.active')?.id;
        if (activePanel === 'panel-login') handleLogin();
        else if (activePanel === 'panel-signup') handleSignup();
      }
    });
    function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const isPassword = input.type === 'password';
  
  // Toggle the type
  input.type = isPassword ? 'text' : 'password';
  
  // Update the icon (optional: switch to an "eye-slash" icon)
  if (isPassword) {
    btn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
      </svg>`;
  } else {
    btn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>`;
  }
}
  </script>
</body>
</html>
